<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本語50音図</title>
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />
  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="pad">
    <section class="intro">
      <div>
        <p class="eyebrow">声音・発音</p>
        <h1>
          来学习平片假名吧！<br />
          认识日语的主要书写系统
        </h1>
        <p>
          左边为平假名、右边为片假名，点击任一假名即可朗读发音。下方按钮也可切换字符组。
        </p>
      </div>
      <div class="voice-status" id="voiceStatus">正在寻找日语朗读声音…</div>
    </section>
    <div class="legend">
      <span>平假名</span>
      <span>片假名</span>
      <span>罗马音</span>
    </div>
    <div class="kana-grid" id="kanaGrid" aria-live="polite"></div>
    <p class="hint">如需完整读音，确保浏览器允许“语音合成”权限。</p>
  </main>
  <script type="module" src="kana.js"></script>
</body>
</html>
